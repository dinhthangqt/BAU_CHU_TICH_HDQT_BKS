<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thẩm định khách hàng vay vốn</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary-bg: #e3f2fd; /* Xanh nhạt chống chói */
            --header-color: #1565c0;
            --section-bg: #ffffff;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--primary-bg);
            margin: 0;
            padding: 15px;
            color: #333;
        }
        h2 { text-align: center; color: var(--header-color); margin-bottom: 20px; }
        .section {
            background: var(--section-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .section h3 {
            border-left: 4px solid var(--header-color);
            padding-left: 10px;
            color: var(--header-color);
            margin-top: 0;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .map-container { height: 250px; width: 100%; border-radius: 8px; border: 1px solid #ccc; margin-top: 5px; }
        .btn-submit {
            background-color: var(--header-color);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-submit:hover { background-color: #0d47a1; }
        .preview-img { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .preview-img img { width: 80px; height: 80px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <h2>PHIẾU THẨM ĐỊNH VAY VỐN</h2>

    <form id="appraisalForm">
        <div class="section">
            <h3>I. Thông tin chung về khách hàng</h3>
            <div class="form-group">
                <label>Quét/Chụp CCCD (Vợ & Chồng):</label>
                <input type="file" accept="image/*" multiple id="cccd_input">
                <p style="font-size: 12px; color: #666;">* Hệ thống sẽ lưu ảnh để tách thông tin sau.</p>
            </div>
            <div class="form-group">
                <label>Họ tên khách hàng:</label>
                <input type="text" name="customer_name" required>
            </div>
            <div class="form-group">
                <label>Vị trí nhà ở (Chấm trên bản đồ):</label>
                <div id="map_home" class="map-container"></div>
                <input type="hidden" name="home_coords" id="home_coords">
            </div>
            <div class="form-group">
                <label>Chụp ảnh nhà ở (Nhiều ảnh):</label>
                <input type="file" accept="image/*" multiple name="home_photos">
            </div>
        </div>

        <div class="section">
            <h3>II. Nhu cầu vay vốn</h3>
            <div class="form-group">
                <label>Tổng nhu cầu vốn:</label>
                <input type="number" name="total_need" id="total_need">
            </div>
            <div class="form-group">
                <label>Vốn tự có:</label>
                <input type="number" name="own_capital" id="own_capital">
            </div>
            <div class="form-group">
                <label>Vốn vay đề nghị:</label>
                <input type="number" name="loan_amount" id="loan_amount" style="background: #eee;" readonly>
            </div>
            <div class="form-group">
                <label>Mục đích vay:</label>
                <textarea name="purpose" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>Vị trí dự án:</label>
                <div id="map_project" class="map-container"></div>
                <input type="hidden" name="project_coords" id="project_coords">
            </div>
            <div class="form-group">
                <label>Chụp ảnh nơi dự án:</label>
                <input type="file" accept="image/*" multiple name="project_photos">
            </div>
            <div class="form-group">
                <label>Thời hạn vay (tháng):</label>
                <input type="number" name="duration">
            </div>
        </div>

        <div class="section">
            <h3>III. Thông tin tài sản đảm bảo</h3>
            <div class="form-group">
                <label>Loại tài sản:</label>
                <select name="asset_type" id="asset_type">
                    <option value="Giấy chứng nhận QSD đất">Thế chấp QSD đất</option>
                    <option value="Không có tài sản">Không có tài sản</option>
                </select>
            </div>
            <div id="asset_detail_section">
                <div class="form-group">
                    <label>Vị trí TSĐB (Chấm bản đồ):</label>
                    <div id="map_asset" class="map-container"></div>
                    <input type="hidden" name="asset_coords" id="asset_coords">
                </div>
                <div class="form-group">
                    <label>Chụp ảnh tài sản (Nhiều ảnh):</label>
                    <input type="file" accept="image/*" multiple name="asset_photos">
                </div>
            </div>
        </div>

        <button type="submit" class="btn-submit">LƯU DỮ LIỆU THẨM ĐỊNH</button>
    </form>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Tự động tính vốn vay
        const totalNeed = document.getElementById('total_need');
        const ownCap = document.getElementById('own_capital');
        const loanAmt = document.getElementById('loan_amount');
        [totalNeed, ownCap].forEach(el => el.addEventListener('input', () => {
            loanAmt.value = (totalNeed.value || 0) - (ownCap.value || 0);
        }));

        // 2. Khởi tạo bản đồ (Hàm chung)
        function initMap(mapId, inputId) {
            const map = L.map(mapId).setView([17.067, 107.031], 13); // Mặc định Hồ Xá, Quảng Trị
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            let marker;
            map.on('click', function(e) {
                if (marker) map.removeLayer(marker);
                marker = L.marker(e.latlng).addTo(map);
                document.getElementById(inputId).value = `${e.latlng.lat}, ${e.latlng.lng}`;
            });
        }
        initMap('map_home', 'home_coords');
        initMap('map_project', 'project_coords');
        initMap('map_asset', 'asset_coords');

        // 3. Xử lý ẩn hiện phần tài sản
        document.getElementById('asset_type').addEventListener('change', function() {
            document.getElementById('asset_detail_section').style.display = (this.value === 'Không có tài sản') ? 'none' : 'block';
        });

        // 4. Gửi dữ liệu (Cần link Google Apps Script)
        const scriptURL = 'THAY_LINK_WEB_APP_CỦA_BẠN_VÀO_ĐÂY';
        const form = document.getElementById('appraisalForm');

        form.addEventListener('submit', e => {
            e.preventDefault();
            alert('Đang xử lý dữ liệu và hình ảnh... Vui lòng đợi.');
            
            const formData = new FormData(form);
            // Ở đây bạn cần viết thêm logic chuyển ảnh sang Base64 nếu muốn lưu trực tiếp qua Apps Script
            // Hoặc gửi link ảnh sau khi upload lên Drive.
            
            fetch(scriptURL, { method: 'POST', body: formData})
                .then(response => alert('Thành công! Dữ liệu đã được lưu vào Google Sheets.'))
                .catch(error => console.error('Lỗi!', error.message));
        });
    </script>
</body>
</html>
